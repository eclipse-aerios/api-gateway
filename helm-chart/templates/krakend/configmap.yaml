{{- if not .Values.krakend.existingConfigmap -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-config" (include "krakend.fullname" .) }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "krakend.labels" . | nindent 4 }}
data:
  krakend.json: |-
    {
      "version": 3,
      {{- if .Values.krakend.tls.enabled }}
      "tls": {
        "public_key": "/etc/certs/cert.pem",
        "private_key": "/etc/certs/key.pem"
      },
      {{- end }}
      {{- with .Values.krakend.config }}
      "extra_config": {
        "auth/validator": {
          "shared_cache_duration": {{ .sharedCacheDuration }}
        },
        "telemetry/logging": {
          "level": {{ .logLevel | quote }},
          "prefix": "[KRAKEND]",
          "syslog": false,
          "stdout": true,
          "format": "default"
        },
        "router": {
          "auto_options": "true",
          "return_error_msg": true,
          "disable_health": {{ .disableHealthEndpoint }}
        },
        "security/cors": {
          "allow_origins": [
            "*"
          ],
          "allow_methods": [
            "*"
          ],
          "expose_headers": [
            "*"
          ],
          "allow_headers": [
            "*"
          ],
          "max_age": "12h",
          "allow_credentials": false,
          "debug": true
        }
      },
      "timeout": "6000ms",
      "cache_ttl": "300s",
      "output_encoding": "json",
      "name": "test",
      "read_timeout": "60s",
      "write_timeout": "60s",
      "idle_timeout": "60s",
      "read_header_timeout": "60s",
      "endpoints": [
        {{- if $.Values.krakend.additionalEndpoints -}}
        {{- include "krakend.endpoints" $ | nindent 8 -}},
        {{- end -}}
        {{- if $.Values.krakend.infrastructureElements -}}
        {{- include "ie.benchmarking.endpoints" $ | nindent 8 -}},
        {{- include "ie.selfapi.endpoints" $ | nindent 8 -}},
        {{- end -}}
        {{- include "orion.endpoints" $ | nindent 8 }},
        {{- include "iota_api.endpoints" $ | nindent 8 }},
        {{- include "federator.endpoints" $ | nindent 8 }},
        {{- include "dataFabric.endpoints" $ | nindent 8 }},
        {{- include "hloFE.endpoints" $ | nindent 8 }},
        {{- include "hloAL.endpoints" $ | nindent 8 }}        
      ]
      {{- end }}
    }
{{- end }}
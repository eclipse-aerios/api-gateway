# Default values for the application.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# String to partially override application.fullname template (will maintain the release name).
nameOverride: ""
# String to fully override application.fullname template.
fullnameOverride: ""
# Deploy all the components in specific K8s node(s).
chartNodeSelector: {}

# Component krakend values.
krakend:
  tier: external
  replicaCount: 1

  # Configuration of the container image.
  imagePullSecrets: []
  image:
    repository: devopsfaith/krakend
    # Overrides the image tag whose default is the chart appVersion.
    tag: "2.6.3"
    pullPolicy: IfNotPresent

  # Configuration of the service: type and ports.
  service:
    type: NodePort
    ports:
      api:
        port: 8080
        targetPort: 8080
        containerPort: 8080
        nodePort: ""
        protocol: TCP

  # KrakenD configuration (krakend.json)
  # Use an existing configmap
  existingConfigmap: ""
  # Create the configmap
  config:
    benchmarkPort: 8010
    disableHealthEndpoint: false
    federatorUrl: http://federator.default.svc.cluster.local:8050
    hloAllocatorUrl: http://hlo-allocator-service.default.svc.cluster.local:8082
    hloFeUrl: http://hlo-fe-service.default.svc.cluster.local:8081
    keycloakUrl: https://keycloak.aerios-project.eu
    keycloakRealm: keycloak-realm
    logLevel: ERROR
    orionCacheDuration: 3600
    orionUrl: http://orion-ld-broker.default.svc.cluster.local:1026
    selfApiPort: 8600
    sharedCacheDuration: 900
    iotaAPIUrl: http://iota-api:6000
    dataProductManagerUrl: http://data-fabric-data-product-manager.default.svc.cluster.local:8000
    dataCatalogManagerUrl: http://data-fabric-data-catalog-service.default.svc.cluster.local:8080

  # Configuration for additional endpoints to add to the configmap
  additionalEndpoints: []
    # Examples:
    # - endpoint: /test/config
    #   method: GET
    #   roles:
    #     - DomainAdministrator1
    #     - CustomRole2
    #   queryStrings:
    #     - q
    #     - attrs
    #   backend:
    #     url: /placeholder/custom/backend
    #     method: GET
    #     host: http://192.168.250.1:8080
    #   inputHeaders:
    #     - Accept
    #     - Authorization
    # - endpoint: /test/anotherendpoint
    #   method: POST
    #   roles:
    #     - DomainAdministrator
    #     - IoTDeployer
    #   queryStrings:
    #     - q
    #     - testq
    #   backend:
    #     url: /placeholder/custom/backend
    #     method: PATCH
    #     host: https://orion-broker-url:1026
    #   inputHeaders:
    #     - X-Auth-Token
    #     - Authorization
    #     - Content-Type

  infrastructureElements: []
    # Examples:
    # - id: fa163e5e25ef
    #   internalIp: 10.0.0.186
    # - id: fa163e32c6ee
    #   internalIp: 10.0.0.238

  tls:
    enabled: false
    existingSecret: ""
    certs:
      cert: 
      key: 

  ingress:
    certManagerIssuer: letsencrypt-prod
    certManagerClusterIssuer: letsencrypt-prod
    className: nginx
    enabled: false
    hostname: test-domain.aerios-project.eu
    path: "/"
    tls: 
      enabled: true

  resources: {}
  autoscaling:
    enabled: false
  
  podSecurityContext: {}
  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1000
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
      add:
        - NET_BIND_SERVICE

  # Configure this parameters to deploy the component in specific K8s node(s).
  nodeSelector: {}
  tolerations: []
  affinity: {}

